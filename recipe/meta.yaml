{% set version = "0.2.9" %}

package:
  name: dataspyre
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/D/DataSpyre/dataspyre-{{ version }}.tar.gz
  sha256: c3a6a14a5a74df7e1c32eb3e2bf6f7971141d703f9eb9b80a67cad2a6c528596

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - cherrypy
    - jinja2
    - matplotlib-base
    - numpy
    - pandas
    - six >=1.11.0

test:
  requires:
    - python {{ python_min }}
  imports:
    - spyre

about:
  home: https://github.com/adamhajari/spyre
  license: MIT
  license_file: '{{ environ["RECIPE_DIR"] }}/LICENSE.txt'
  summary: 'Web Application Framework for simple user interface.'

extra:
  recipe-maintainers:
    - ocefpaf
